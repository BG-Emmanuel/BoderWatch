worker_processes auto;
events { worker_connections 65535; use epoll; multi_accept on; }
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on; tcp_nopush on; tcp_nodelay on;
  gzip on; gzip_types text/plain text/css application/json application/javascript;
  limit_req_zone  $binary_remote_addr zone=api:20m  rate=200r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m rate=10r/s;
  upstream ingestion  { least_conn; server ingestion-1:8081; server ingestion-2:8081; keepalive 64; }
  upstream tracking   { least_conn; server tracking-1:8082;  server tracking-2:8082;  keepalive 32; }
  upstream compliance { least_conn; server compliance-1:8083; server compliance-2:8083; keepalive 32; }
  server {
    listen 80;
    server_name _;
    location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
    location /api/v1/auth {
      limit_req zone=auth burst=20 nodelay;
      proxy_pass http://ingestion; proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/telemetry {
      limit_req zone=api burst=1000 nodelay;
      proxy_pass http://ingestion; proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_read_timeout 10s;
    }
    location ~ ^/api/v1/(trucks|users|corridors|notifications) {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://ingestion; proxy_http_version 1.1;
      proxy_set_header Connection ""; proxy_set_header Host $host;
    }
    location /api/v1/tracking {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://tracking; proxy_http_version 1.1; proxy_set_header Connection "";
    }
    location /api/v1/compliance {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://compliance; proxy_http_version 1.1; proxy_set_header Connection "";
    }
    location /actuator { deny all; }
    location / {
      root /usr/share/nginx/html; index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
}
