---
- name: BorderWatch complete VPS setup
  hosts: localhost
  become: yes
  vars:
    server_ip: "13.140.132.85"
    deploy_user: deployer
    project_dir: /home/deployer/BoderWatch

  tasks:

    # ═══════════════════════════════
    # SYSTEM CONFIGURATION
    # ═══════════════════════════════

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - python3
          - python3-pip
          - net-tools
          - docker.io
          - nginx
        state: present
        update_cache: yes

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Ensure deployer is in docker group
      user:
        name: "{{ deploy_user }}"
        groups: docker
        append: yes

    - name: Give deployer passwordless sudo
      lineinfile:
        path: /etc/sudoers
        line: "deployer ALL=(ALL) NOPASSWD: ALL"
        validate: "visudo -cf %s"

    - name: Set vm.max_map_count for SonarQube
      sysctl:
        name: vm.max_map_count
        value: "524288"
        state: present
        reload: yes

    - name: Set fs.file-max
      sysctl:
        name: fs.file-max
        value: "131072"
        state: present
        reload: yes

    # ═══════════════════════════════
    # NGINX CONFIGURATION
    # ═══════════════════════════════

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create Jenkins nginx config
      copy:
        dest: /etc/nginx/sites-available/jenkins
        content: |
          server {
              listen 80;
              server_name {{ server_ip }};

              location / {
                  proxy_pass         http://127.0.0.1:8080;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_connect_timeout   90;
                  proxy_send_timeout      90;
                  proxy_read_timeout      90;
                  client_max_body_size    10m;
              }
          }

    - name: Create SonarQube nginx config
      copy:
        dest: /etc/nginx/sites-available/sonarqube
        content: |
          server {
              listen 9080;
              server_name {{ server_ip }};

              location / {
                  proxy_pass         http://127.0.0.1:9000;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
              }
          }

    - name: Enable Jenkins nginx site
      file:
        src: /etc/nginx/sites-available/jenkins
        dest: /etc/nginx/sites-enabled/jenkins
        state: link

    - name: Enable SonarQube nginx site
      file:
        src: /etc/nginx/sites-available/sonarqube
        dest: /etc/nginx/sites-enabled/sonarqube
        state: link

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0

    # ═══════════════════════════════
    # JENKINS DEPLOYMENT
    # ═══════════════════════════════

    - name: Check if Jenkins container exists
      command: docker inspect jenkins
      register: jenkins_exists
      ignore_errors: yes
      become: no

    - name: Create Jenkins container if not exists
      command: >
        docker run -d
        --name jenkins
        -p 127.0.0.1:8080:8080
        -p 127.0.0.1:50000:50000
        -v jenkins_home:/var/jenkins_home
        --restart unless-stopped
        jenkins/jenkins:lts
      when: jenkins_exists.rc != 0
      become: no

    - name: Ensure Jenkins container is started
      command: docker start jenkins
      ignore_errors: yes
      become: no

    # ═══════════════════════════════
    # BORDERWATCH SERVICES
    # ═══════════════════════════════

    - name: Pull latest code
      git:
        repo: "https://github.com/YOUR_USERNAME/BoderWatch.git"
        dest: "{{ project_dir }}"
        version: main
        force: yes
      become: no
      ignore_errors: yes

    - name: Check .env file exists
      stat:
        path: "{{ project_dir }}/.env"
      register: env_file

    - name: Copy .env.example if .env missing
      copy:
        src: "{{ project_dir }}/.env.example"
        dest: "{{ project_dir }}/.env"
        remote_src: yes
      when: not env_file.stat.exists
      become: no

    - name: Start all BorderWatch services
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      become: no

    # ═══════════════════════════════
    # VERIFY EVERYTHING
    # ═══════════════════════════════

    - name: Get all container statuses
      command: docker ps --format "{{.Names}}\t{{.Status}}"
      register: container_status
      become: no

    - name: Print container status
      debug:
        msg: "{{ container_status.stdout_lines }}"

    - name: Check gateway health
      uri:
        url: http://localhost:8088/actuator/health
        method: GET
        status_code: 200
      register: gateway_health
      ignore_errors: yes
      become: no

    - name: Check ingestion health
      uri:
        url: http://localhost:8081/actuator/health
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Check tracking health
      uri:
        url: http://localhost:8082/actuator/health
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Check compliance health
      uri:
        url: http://localhost:8083/actuator/health
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Check Prometheus health
      uri:
        url: http://localhost:9090/-/healthy
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Check Grafana health
      uri:
        url: http://localhost:3000/api/health
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Check SonarQube status
      uri:
        url: http://localhost:9000/api/system/status
        method: GET
        status_code: 200
      ignore_errors: yes
      become: no

    - name: Print final summary
      debug:
        msg:
          - "==============================="
          - "BorderWatch setup complete"
          - "==============================="
          - "Jenkins:    http://{{ server_ip }}"
          - "SonarQube:  http://{{ server_ip }}:9000"
          - "Grafana:    http://{{ server_ip }}:3000"
          - "Prometheus: http://{{ server_ip }}:9090"
          - "RabbitMQ:   http://{{ server_ip }}:15672"
          - "Gateway:    http://{{ server_ip }}:8088"
          - "==============================="
