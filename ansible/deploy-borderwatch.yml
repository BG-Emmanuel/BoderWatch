---
- name: Deploy BorderWatch application
  hosts: localhost
  become: no
  tasks:
    - name: Pull latest code from git
      git:
        repo: "https://github.com/YOUR_USERNAME/BoderWatch.git"
        dest: "{{ project_dir }}"
        version: main
        force: yes

    - name: Check .env file exists
      stat:
        path: "{{ project_dir }}/.env"
      register: env_file

    - name: Copy .env.example if .env missing
      copy:
        src: "{{ project_dir }}/.env.example"
        dest: "{{ project_dir }}/.env"
        remote_src: yes
      when: not env_file.stat.exists

    - name: Start all BorderWatch services
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for services to be healthy
      command: >
        docker inspect --format="{{ '{{' }}.State.Health.Status{{ '}}' }}"
        borderwatch-{{ item }}-1
      register: health
      until: health.stdout == "healthy"
      retries: 20
      delay: 15
      loop:
        - mysql
        - rabbitmq
        - ingestion-1
        - ingestion-2---
