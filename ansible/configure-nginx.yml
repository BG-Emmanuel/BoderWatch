---
- name: Configure nginx reverse proxy
  hosts: localhost
  become: yes
  tasks:
    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create Jenkins nginx config
      copy:
        dest: /etc/nginx/sites-available/jenkins
        content: |
          server {
              listen 80;
              server_name {{ server_ip }};

              location / {
                  proxy_pass         http://127.0.0.1:8080;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_connect_timeout   90;
                  proxy_send_timeout      90;
                  proxy_read_timeout      90;
                  client_max_body_size    10m;
              }
          }

    - name: Create SonarQube nginx config
      copy:
        dest: /etc/nginx/sites-available/sonarqube
        content: |
          server {
              listen 9080;
              server_name {{ server_ip }};

              location / {
                  proxy_pass         http://127.0.0.1:9000;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
              }
          }

    - name: Enable Jenkins site
      file:
        src: /etc/nginx/sites-available/jenkins
        dest: /etc/nginx/sites-enabled/jenkins
        state: link

    - name: Enable SonarQube site
      file:
        src: /etc/nginx/sites-available/sonarqube
        dest: /etc/nginx/sites-enabled/sonarqube
        state: link

    - name: Test nginx configuration
      command: nginx -t
      register: nginx_test

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
      when: nginx_test.rc == 0---
