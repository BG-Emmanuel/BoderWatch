apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: borderwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: borderwatch/ingestion:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SERVICE_ID
              value: ingestion
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/borderwatch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: bw
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: MYSQL_PASSWORD
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-1
  namespace: borderwatch
spec:
  selector:
    app: ingestion
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-2
  namespace: borderwatch
spec:
  selector:
    app: ingestion
  ports:
    - port: 8081
      targetPort: 8081
