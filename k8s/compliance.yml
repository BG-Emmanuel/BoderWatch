apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance
  namespace: borderwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliance
  template:
    metadata:
      labels:
        app: compliance
    spec:
      containers:
        - name: compliance
          image: borderwatch/compliance:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            - name: SERVICE_ID
              value: compliance
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/borderwatch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: bw
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: MYSQL_PASSWORD
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: borderwatch-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-1
  namespace: borderwatch
spec:
  selector:
    app: compliance
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-2
  namespace: borderwatch
spec:
  selector:
    app: compliance
  ports:
    - port: 8083
      targetPort: 8083
