global:
  smtp_from: borderwatch@customs.cm
route:
  group_by: [alertname]
  group_wait: 30s
  repeat_interval: 12h
  receiver: default
  routes:
    - match: {severity: critical}
      receiver: critical
receivers:
  - name: default
    email_configs:
      - to: ops@borderwatch.cm
        send_resolved: true
  - name: critical
    email_configs:
      - to: director@customs.cm
        send_resolved: true
